---
name: Ansible Role CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 0'  # Run every Sunday at 6 AM UTC

# Cancel previous runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}



# Minimal permissions by default
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    timeout-minutes: 15  # Prevent hung jobs
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit ansible-lint==6.22.1 yamllint==1.32.0

      - name: Run pre-commit checks
        run: |
          pre-commit install
          pre-commit run --all-files --show-diff-on-failure

  molecule:
    name: Molecule
    runs-on: ubuntu-22.04
    timeout-minutes: 15  # Prevent hung jobs
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - "9.0.0"
          - "10.0.0"
        scenario:
          - default
          - multi-instance
        distro:
          - ubuntu2204
          - debian11
    env:
      PY_COLORS: '1'
      ANSIBLE_FORCE_COLOR: '1'
      MOLECULE_DISTRO: ${{ matrix.distro }}

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible==${{ matrix.ansible }} molecule==6.0.2 molecule-plugins[docker]==23.5.0 docker==6.1.3

      - name: Run Molecule tests
        run: molecule test -s ${{ matrix.scenario }}

  additional-scenarios:
    name: Additional Scenarios
    runs-on: ubuntu-22.04
    timeout-minutes: 15  # Prevent hung jobs
    needs: molecule
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - backup
          - monitoring
          - version-matrix
    env:
      PY_COLORS: '1'
      ANSIBLE_FORCE_COLOR: '1'
      MOLECULE_DISTRO: ubuntu2204

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible==10.0.0 molecule==6.0.2 molecule-plugins[docker]==23.5.0 docker==6.1.3

      - name: Run Molecule tests
        run: molecule test -s ${{ matrix.scenario }}

  supported-distros:
    name: Test Supported Distros
    runs-on: ubuntu-22.04
    timeout-minutes: 15  # Prevent hung jobs
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu2204
          - ubuntu2004
          - debian12
          - debian11
          - rockylinux9
          - rockylinux8
    env:
      PY_COLORS: '1'
      ANSIBLE_FORCE_COLOR: '1'
      MOLECULE_DISTRO: ${{ matrix.distro }}

    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible==10.0.0 molecule==6.0.2 molecule-plugins[docker]==23.5.0

      - name: Run Molecule tests
        run: molecule test

  docker:
    name: Docker Test
    runs-on: ubuntu-22.04
    timeout-minutes: 15  # Prevent hung jobs
    needs: [molecule, supported-distros]
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build the Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dev/Dockerfile
          push: false
          load: true
          tags: mariadb-ansible-test:latest

      - name: Start Docker services
        run: |
          mkdir -p files
          touch files/custom.cnf  # Create empty file
          docker-compose -f dev/docker-compose.yml up -d
          # Wait for MariaDB to be ready
          for i in {1..30}; do
            if docker-compose -f dev/docker-compose.yml exec -T mariadb mysqladmin ping -h localhost --silent; then
              break
            fi
            echo "Waiting for MariaDB to be ready..."
            sleep 2
          done

      - name: Test MariaDB container
        run: |
          docker-compose -f dev/docker-compose.yml exec -T mariadb mysql -u root -proot -e "SHOW DATABASES;"
          docker-compose -f dev/docker-compose.yml exec -T mariadb mysql -u root -proot -e "SELECT VERSION();"

      - name: Clean up Docker services
        run: docker-compose -f dev/docker-compose.yml down

  docker-replication:
    name: Docker Replication Test
    runs-on: ubuntu-22.04
    timeout-minutes: 15  # Prevent hung jobs
    needs: docker
    steps:
      - name: Check out the codebase
        uses: actions/checkout@v6

      - name: Create required directories
        run: |
          mkdir -p tests/config
          mkdir -p config

      - name: Create test config files
        run: |
          echo "[mysqld]" > tests/config/primary.cnf
          echo "server-id = 1" >> tests/config/primary.cnf
          echo "log-bin = mysql-bin" >> tests/config/primary.cnf

          echo "[mysqld]" > tests/config/replica.cnf
          echo "server-id = 2" >> tests/config/replica.cnf
          echo "read_only = ON" >> tests/config/replica.cnf

          touch files/custom.cnf  # Create empty file

      - name: Build Docker images
        run: |
          docker build -t mariadb-ansible-test -f dev/Dockerfile .
          docker build -t mariadb-test -f tests/Dockerfile.test .

      - name: Start replication containers
        run: |
          docker-compose -f dev/docker-compose.yml --profile test up -d mariadb-primary mariadb-replica
          # Wait for MariaDB primary to be ready
          for i in {1..30}; do
            if docker-compose -f dev/docker-compose.yml exec -T mariadb-primary \
              mysqladmin ping -h localhost --silent; then
              break
            fi
            echo "Waiting for MariaDB primary to be ready..."
            sleep 2
          done
          # Wait for MariaDB replica to be ready
          for i in {1..30}; do
            if docker-compose -f dev/docker-compose.yml exec -T mariadb-replica \
              mysqladmin ping -h localhost --silent; then
              break
            fi
            echo "Waiting for MariaDB replica to be ready..."
            sleep 2
          done

      - name: Test replication
        run: docker-compose -f dev/docker-compose.yml --profile test run --rm test-replication

      - name: Clean up Docker services
        run: docker-compose -f dev/docker-compose.yml --profile test down -v
