[tool.black]
line-length = 80
target-version = ['py38', 'py39', 'py310', 'py311']
include = '\.pyi?$'
extend-exclude = '''
/(
  # directories
  \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
)/
'''

[tool.isort]
profile = "google"
line_length = 80
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true

[tool.pylint.messages_control]
disable = "C0111,E0401,R0903,C0103,W0612,W0613,R0801"

[tool.pylint.format]
max-line-length = 80

[tool.pylint.basic]
good-names = "i,j,k,ex,_,id,db,ip"

[tool.pylint.design]
max-args = 10
min-public-methods = 1
